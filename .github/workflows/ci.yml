name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          MICHAEL_HQ_OWNER_ID: ${{ secrets.MICHAEL_HQ_OWNER_ID }}
          NODE_ENV: production

      - name: Runtime smoke test
        run: npm run smoke:runtime

      - name: Joris smoke test
        run: npm run smoke:joris

      - name: Unit tests
        run: npm test
